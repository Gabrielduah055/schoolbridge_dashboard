<section class="comm-page">
  <section class="comm-card pad settings-card">
    <div>
      <h2 class="comm-section-title">Admin Account</h2>
      <p class="comm-muted">Dashboard access is protected by your SchoolBridge admin login.</p>
    </div>

    <div class="settings-grid">
      <div>
        <span>Backend URL</span>
        <strong>{{ apiUrl }}</strong>
      </div>
      <div>
        <span>Name</span>
        <strong>{{ user?.name || '-' }}</strong>
      </div>
      <div>
        <span>Email</span>
        <strong>{{ user?.email || '-' }}</strong>
      </div>
      <div>
        <span>Role</span>
        <strong>{{ user?.role || '-' }}</strong>
      </div>
      <div class="full">
        <span>Permissions</span>
        <strong>{{ permissionPreview() || '-' }}</strong>
      </div>
    </div>

    <div class="settings-actions">
      <button class="comm-button-secondary" type="button" (click)="logout()">Log out</button>
    </div>
  </section>
</section>
