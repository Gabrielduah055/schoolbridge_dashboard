<section class="comm-page">
  <section class="comm-card pad settings-card">
    <div>
      <h2 class="comm-section-title">Backend Access</h2>
      <p class="comm-muted">Protected dashboard endpoints require an admin API key.</p>
    </div>

    <div class="settings-grid">
      <div>
        <span>Backend URL</span>
        <strong>{{ apiUrl }}</strong>
      </div>
      <label class="comm-field">
        <span>Admin API key</span>
        <input type="password" [(ngModel)]="adminApiKey" placeholder="Paste ADMIN_API_KEY" autocomplete="off" />
      </label>
    </div>

    <div class="settings-actions">
      <button class="comm-button" type="button" (click)="save()">Save key locally</button>
      <button class="comm-button-secondary" type="button" (click)="clear()">Clear key</button>
      <span *ngIf="saved" class="saved-note">Settings updated.</span>
    </div>
  </section>
</section>
