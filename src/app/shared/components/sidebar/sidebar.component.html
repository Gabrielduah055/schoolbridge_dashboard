<aside class="sidebar" aria-label="SchoolBridge navigation">
  <a class="brand-mark" routerLink="/" aria-label="SchoolBridge dashboard">SB</a>

  <nav class="nav-list">
    <a
      *ngFor="let item of navItems"
      class="nav-item"
      [routerLink]="item.path"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      [attr.aria-label]="item.label"
      [attr.title]="item.label"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path [attr.d]="getIconPath(item.icon)" />
      </svg>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-account" *ngIf="user$ | async as user">
    <div class="account-summary">
      <span class="admin-mini">{{ initials(user) }}</span>
      <span class="account-text">
        <strong>{{ user.name }}</strong>
        <small>{{ user.role }}</small>
      </span>
    </div>
    <button class="logout-button" type="button" (click)="logout()">Logout</button>
  </div>
</aside>
